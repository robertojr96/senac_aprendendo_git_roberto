<!DOCTYPE html>
<html lang="br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrinho</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-rbsA2VBKQhggwzxH7pPCaAqO46MgnOM80zW1RWuH61DGLwZJEdK2Kadq2F9CUG65" crossorigin="anonymous">
</head>
<body>

<nav class="navbar navbar-expand-lg bg-light">
  <div class="container-fluid">
    <a class="navbar-brand" href="#">Navbar</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
      <span class="navbar-toggler-icon"></span>
    </button>
    <div class="collapse navbar-collapse" id="navbarSupportedContent">
      <ul class="navbar-nav me-auto mb-2 mb-lg-0">
        <li class="nav-item">
          <a class="nav-link" href="#">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="produtos.html">Produtos</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" href="contato.html">Contato</a>
        </li>
      </ul>
      <a href="carrinho.html" class="btn btn-warning ms-2">🛒 Carrinho (<span id="nav-qtd">0</span>)</a>
    </div>
  </div>
</nav>

<div class="container mt-4">
  <h2>Carrinho de Compras</h2>
  <hr>

  <div id="carrinho-vazio" class="alert alert-secondary" style="display:none;">
    Seu carrinho está vazio. <a href="produtos.html">Ver produtos</a>
  </div>

  <table class="table" id="tabela-carrinho">
    <thead>
      <tr>
        <th>Produto</th>
        <th>Preço Unit.</th>
        <th>Quantidade</th>
        <th>Subtotal</th>
        <th>Ação</th>
      </tr>
    </thead>
    <tbody id="itens-carrinho"></tbody>
  </table>

  <div class="alert alert-info text-end">
    <strong>Total do Pedido: R$ <span id="total-pedido">0,00</span></strong>
  </div>

  <button class="btn btn-success" onclick="finalizarPedido()">Finalizar Pedido</button>
  <a href="produtos.html" class="btn btn-secondary ms-2">Continuar Comprando</a>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.2.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-kenU1KFdBIe4zVF0s0G1M5b4hcpxyD9F7jL+jjXkk+Q2h455rYXK/7HAuoJl+0I4" crossorigin="anonymous"></script>
<script>
  function renderizarCarrinho() {
    const carrinho = JSON.parse(localStorage.getItem('carrinho') || '[]');
    const tbody = document.getElementById('itens-carrinho');
    const tabela = document.getElementById('tabela-carrinho');
    const vazio = document.getElementById('carrinho-vazio');
    const navQtd = document.getElementById('nav-qtd');

    navQtd.textContent = carrinho.reduce((s, i) => s + i.qtd, 0);

    if (carrinho.length === 0) {
      tabela.style.display = 'none';
      vazio.style.display = 'block';
      document.getElementById('total-pedido').textContent = '0,00';
      return;
    }

    tabela.style.display = '';
    vazio.style.display = 'none';

    tbody.innerHTML = carrinho.map(item => `
      <tr>
        <td>${item.nome}</td>
        <td>R$ ${item.preco.toLocaleString('pt-BR', {minimumFractionDigits:2})}</td>
        <td>
          <input type="number" value="${item.qtd}" min="1" style="width:70px"
            onchange="alterarQtd('${item.id}', this.value)">
        </td>
        <td>R$ ${(item.preco * item.qtd).toLocaleString('pt-BR', {minimumFractionDigits:2})}</td>
        <td><button class="btn btn-danger btn-sm" onclick="removerItem('${item.id}')">Remover</button></td>
      </tr>
    `).join('');

    const total = carrinho.reduce((s, i) => s + i.preco * i.qtd, 0);
    document.getElementById('total-pedido').textContent =
      total.toLocaleString('pt-BR', {minimumFractionDigits:2});
  }

  function removerItem(id) {
    let carrinho = JSON.parse(localStorage.getItem('carrinho') || '[]');
    carrinho = carrinho.filter(i => i.id !== id);
    localStorage.setItem('carrinho', JSON.stringify(carrinho));
    renderizarCarrinho();
  }

  function alterarQtd(id, novaQtd) {
    let carrinho = JSON.parse(localStorage.getItem('carrinho') || '[]');
    const item = carrinho.find(i => i.id === id);
    if (item) item.qtd = Math.max(1, parseInt(novaQtd) || 1);
    localStorage.setItem('carrinho', JSON.stringify(carrinho));
    renderizarCarrinho();
  }

  function finalizarPedido() {
    const carrinho = JSON.parse(localStorage.getItem('carrinho') || '[]');
    if (carrinho.length === 0) { alert('Carrinho vazio!'); return; }
    const total = carrinho.reduce((s, i) => s + i.preco * i.qtd, 0);
    alert('Pedido finalizado! Total: R$ ' + total.toLocaleString('pt-BR', {minimumFractionDigits:2}));
    localStorage.removeItem('carrinho');
    renderizarCarrinho();
  }

  renderizarCarrinho();
</script>
</body>
</html>
